<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colombia 2026 | El Gran Viaje</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a2635;
    --muted: #7a8fa3;
    --accent: #ce1126; 
    --gold: #fcd116;
    --blue: #003893;
    --sand: #fdf9f5;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: linear-gradient(135deg, #e0f2fe 0%, #fdf9f5 50%, #fff7ed 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    color: var(--ink);
    overflow-x: hidden;
  }

  /* Animación del avión de fondo */
  .plane-bg {
    font-size: 3rem;
    position: absolute;
    top: 15%;
    left: -100px;
    animation: fly 18s linear infinite;
    opacity: 0.4;
    z-index: 0;
  }

  @keyframes fly {
    0% { left: -100px; transform: translateY(0) rotate(5deg); }
    50% { transform: translateY(30px) rotate(0deg); }
    100% { left: 110%; transform: translateY(-30px) rotate(-5deg); }
  }

  .card {
    background: white;
    border-radius: 35px;
    overflow: hidden;
    max-width: 450px;
    width: 100%;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
    position: relative;
    z-index: 1;
    animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1);
  }

  /* Contenedor de la imagen con animación de zoom */
  .image-container {
    width: 100%;
    height: 400px;
    overflow: hidden;
    position: relative;
  }

  .image-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    animation: kenBurns 10s ease-in-out infinite alternate;
  }

  .image-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 50%;
    background: linear-gradient(to top, rgba(255,255,255,1), transparent);
  }

  @keyframes kenBurns {
    0% { transform: scale(1); }
    100% { transform: scale(1.15); }
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .content {
    padding: 0 2.5rem 2.5rem;
    text-align: center;
    margin-top: -20px;
    position: relative;
  }

  .label-top {
    font-size: 0.75rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--blue);
    font-weight: 700;
    margin-bottom: 0.5rem;
  }

  .event-title {
    font-family: 'DM Serif Display', serif;
    font-size: 2.8rem;
    color: var(--ink);
    line-height: 1;
    margin-bottom: 0.8rem;
  }

  .destination-date {
    font-size: 0.9rem;
    color: var(--muted);
    margin-bottom: 2rem;
    font-weight: 500;
  }

  /* Grid de cuenta atrás con estilo minimalista */
  .countdown-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.5rem;
    background: var(--sand);
    padding: 1.2rem;
    border-radius: 20px;
    border: 1px solid rgba(0,0,0,0.03);
  }

  .unit {
    display: flex;
    flex-direction: column;
  }

  .unit-number {
    font-family: 'DM Serif Display', serif;
    font-size: 1.8rem;
    color: var(--accent);
  }

  .unit-label {
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 700;
  }

  .flag-detail {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin-top: 2rem;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .d-y { background: var(--gold); }
  .d-b { background: var(--blue); }
  .d-r { background: var(--accent); }

  @media (max-width: 400px) {
    .content { padding: 0 1.5rem 2rem; }
    .event-title { font-size: 2.2rem; }
  }
</style>
</head>
<body>

<div class="plane-bg">✈️</div>

<div class="card">
  <div class="image-container">
    <img src="colombia.jpg" alt="Colombia Expedition">
    <div class="image-overlay"></div>
  </div>
  
  <div class="content">
    <div class="label-top">Próxima Aventura</div>
    <h1 class="event-title">Colombia</h1>
    <p class="destination-date">27 de Junio, 2026</p>

    <div class="countdown-grid">
      <div class="unit">
        <div class="unit-number" id="days">00</div>
        <div class="unit-label">Días</div>
      </div>
      <div class="unit">
        <div class="unit-number" id="hours">00</div>
        <div class="unit-label">Horas</div>
      </div>
      <div class="unit">
        <div class="unit-number" id="minutes">00</div>
        <div class="unit-label">Min</div>
      </div>
      <div class="unit">
        <div class="unit-number" id="seconds">00</div>
        <div class="unit-label">Seg</div>
      </div>
    </div>

    <div class="flag-detail">
      <div class="dot d-y"></div>
      <div class="dot d-b"></div>
      <div class="dot d-r"></div>
    </div>
  </div>
</div>

<script>
  // Fecha fija: 27 de Junio de 2026
  const targetDate = new Date("June 27, 2026 00:00:00").getTime();

  function update() {
    const now = new Date().getTime();
    const diff = targetDate - now;

    if (diff <= 0) {
      document.querySelector('.countdown-grid').innerHTML = "<div style='grid-column: span 4; font-family: \"DM Serif Display\"; font-size: 1.5rem; color: var(--blue)'>¡El viaje ha comenzado! 🇨🇴</div>";
      return;
    }

    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
    const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const s = Math.floor((diff % (1000 * 60)) / 1000);

    document.getElementById('days').textContent = d;
    document.getElementById('hours').textContent = String(h).padStart(2, '0');
    document.getElementById('minutes').textContent = String(m).padStart(2, '0');
    document.getElementById('seconds').textContent = String(s).padStart(2, '0');
  }

  setInterval(update, 1000);
  update();
</script>

</body>
</html>
